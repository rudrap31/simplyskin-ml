model_name: efficientnet_b0
num_classes: 4
pretrained: true
input_size: 224

seed: 42
batch_size: 32
num_workers: 2
epochs: 40

lr: 0.0003
weight_decay: 0.0001
lr_step_size: 10
lr_gamma: 0.5

class_weighting: true
early_stopping_patience: 8
selection_metric: val_macro_f1
log_interval: 20

device: auto

manifest_path: datasets/acnescu/classifier/manifest.csv
output_dir: runs/classifier_baseline
